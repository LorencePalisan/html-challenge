<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>HTML & CSS Structure Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap");

      body {
        background-color: #0f172a;
        color: #e2e8f0;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .code-editor {
        font-family: "Fira Code", monospace;
        resize: none;
        background: #1e293b;
        color: #ffffff;
        line-height: 1.6;
        outline: none;
        width: 100%;
        height: 100%;
        padding: 1.5rem;
        min-height: 750px;
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #1e293b;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 4px;
      }

      .preview-container {
        background: white;
        color: black;
        border-radius: 8px;
        overflow-y: auto;
      }

      /* Default Challenge Classes - These can be overridden in the CSS editor */
      #user-styles-container {
      }
    </style>
  </head>

      <!-- Bottom Pane: Dual Editors (HTML & CSS) -->

        <div class="flex min-w-full h-fit">

      // 1. Tag auto-closing logic
      htmlEditor.addEventListener("keydown", (e) => {
        if (e.key === ">") {
          const pos = htmlEditor.selectionStart;
          const text = htmlEditor.value;
          const lastOpen = text.lastIndexOf("<", pos);
          if (lastOpen !== -1) {
            const tagContent = text.substring(lastOpen + 1, pos);
            const tagName = tagContent.split(/[ >]/)[0];
            const voidTags = ["img", "br", "hr", "input", "meta", "link"];
            if (
              tagName &&
              !tagName.startsWith("/") &&
              !voidTags.includes(tagName)
            ) {
              e.preventDefault();
              const before = text.substring(0, pos);
              const after = text.substring(pos);
              htmlEditor.value = `${before}></${tagName}>${after}`;
              htmlEditor.selectionStart = htmlEditor.selectionEnd = pos + 1;
              updatePreview();
            }
          }
        }
      });

      // 2. Real-time Preview & Style Update
      htmlEditor.addEventListener("input", updatePreview);
      cssEditor.addEventListener("input", updateStyles);

      function updatePreview() {
        livePreview.innerHTML =
          `<style>${cssEditor.value}</style>` + htmlEditor.value;
      }

      function updateStyles() {
        styleSheet.textContent = cssEditor.value;
        updatePreview();
      }

                        <ul style="padding-left:1.25rem;margin-bottom:1rem;color:#475569">
                            <li>200g spaghetti</li>
                            <li>100g pancetta</li>
                            <li>2 large eggs</li>
                            <li>50g Parmesan, grated</li>
                            <li>Black pepper to taste</li>
                        </ul>
                        <h3 style="font-weight:bold;margin-bottom:0.5rem">Instructions</h3>
                        <ol style="padding-left:1.25rem;color:#475569">
                            <li style="margin-bottom:0.25rem">Cook pasta until al dente and reserve pasta water.</li>
                            <li style="margin-bottom:0.25rem">Fry pancetta until crispy.</li>
                            <li style="margin-bottom:0.25rem">Mix eggs and Parmesan in a bowl.</li>
                            <li>Combine everything off heat, adding pasta water to loosen.</li>
                        </ol>
                    </div>
                `,
        },
      ];

      let currentChallengeIndex = -1;

      function generateChallenge() {
        let newIndex;
        do {
          newIndex = Math.floor(Math.random() * challenges.length);
        } while (newIndex === currentChallengeIndex && challenges.length > 1);

        currentChallengeIndex = newIndex;
        const challenge = challenges[currentChallengeIndex];

        // Goal view is its own island, we need to inject the CSS there too
        targetView.innerHTML = `<style>${defaultCSS}</style>${challenge.html}`;

        htmlEditor.value = challenge.template;
        cssEditor.value = defaultCSS;

        updateStyles();
        updatePreview();

        document.getElementById("status-tag").innerText =
          `Challenge: ${challenge.name}`;
      }

      window.onload = generateChallenge;
    </script>
  </body>
</html>
